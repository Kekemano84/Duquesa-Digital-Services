<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Duquesa Digital Services{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header class="topbar">
  <a href="{{ url_for('index') }}" class="brand">
    <span class="brand-mark">D</span>
    <span><b>Duquesa</b><small>Digital Services</small></span>
  </a>
  <nav class="nav">
    <a href="{{ url_for('index') }}#services">Services</a>
    <a href="{{ url_for('index') }}#demos">Demos</a>
    <a href="{{ url_for('index') }}#pricing">Pricing</a>
    <a href="{{ url_for('contact') }}">Contact</a>
    <a href="{{ url_for('admin') }}">Admin</a>
    <button class="lang active" data-lang="en">EN</button>
    <button class="lang" data-lang="es">ES</button>
  </nav>
</header>
<main>{% block content %}{% endblock %}</main>
<a class="wa" href="https://wa.me/447584724809?text=Hello%2C%20I%20would%20like%20to%20ask%20about%20a%20website%20for%20my%20business%20in%20Duquesa." target="_blank">WhatsApp</a>
<footer class="footer">
  <div class="brand compact"><span class="brand-mark">D</span><span><b>Duquesa</b><small>Digital Services</small></span></div>
  <p>Premium websites, booking systems and automation for local businesses around Duquesa.</p>
  <p>+44 7584 724809 · seagoing8888@gmail.com</p>
</footer>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
