{% set title=t.try_title %}{% set text=t.try_text %}
{% extends "base.html" %}
{% block content %}
<section class="form-section">
  <div class="form-card">
    <p class="eyebrow">REQUEST</p>
    <h1>{{ title }}</h1>
    <p>{{ text }}</p>
    <form method="post">
      <input name="name" placeholder="{{ t.name }}" required>
      <input name="email" type="email" placeholder="{{ t.email }}" required>
      <select name="business">
        <option>{{ t.business }}</option>
        {% for d in demos %}
        <option>{{ d.name }}</option>
        {% endfor %}
      </select>
      <select name="plan">
        <option>Package / Plan</option>
        {% for p in plans %}
        <option>{{ p.name }} - {{ p.setup }} + {{ p.monthly }}</option>
        {% endfor %}
      </select>
      <textarea name="message" placeholder="{{ t.message }}"></textarea>
      <button class="btn primary" type="submit">{{ t.submit }}</button>
    </form>
  </div>
</section>
{% endblock %}
