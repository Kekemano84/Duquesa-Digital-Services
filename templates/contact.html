{% extends 'base.html' %}
{% block content %}
<section class="section contact-section">
  <div class="contact-card">
    <span class="eyebrow">Start a project</span><h1>Tell us what you want to build.</h1><p>Submit the form and it will open WhatsApp with a ready message.</p>
    <form method="post" class="form">
      <input name="name" placeholder="Your name" required><input name="business" placeholder="Business name" required>
      <select name="service">{% for s in services %}<option {% if selected_service == s.title %}selected{% endif %}>{{ s.title }}</option>{% endfor %}</select>
      <select name="plan">{% for p in plans %}<option {% if selected_plan == p.name %}selected{% endif %}>{{ p.name }}</option>{% endfor %}</select>
      <textarea name="notes" placeholder="What do you need?"></textarea><button class="btn primary">Open WhatsApp Message</button>
    </form>
  </div>
</section>
{% endblock %}
